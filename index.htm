<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Station</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#fff;margin:0;padding:20px;font-family:'宋体',SimSun,'Times New Roman',serif;font-size:14px;color:#000}
        ._c{max-width:1200px;margin:0 auto;border:2px solid #000;background:#fff;padding:10px}
        ._m{background:#808080;color:#fff;padding:6px 0;overflow:hidden;white-space:nowrap;font-family:'宋体',SimSun,monospace;font-size:16px;border:1px solid #000;margin-bottom:12px}
        ._mt{display:inline-block;padding-left:100%;animation:_a 22s infinite steps(35,end)}
        @keyframes _a{0%{transform:translateX(0%)}100%{transform:translateX(-100%)}}
        ._h{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:20px}
        ._hl{font-size:18px;font-weight:bold;text-decoration:underline;cursor:pointer;color:#000;background:#fff;font-family:'宋体',SimSun,serif}
        ._dn{font-size:16px;text-decoration:underline;cursor:pointer;color:#000;background:#fff;font-family:'宋体',SimSun,serif}
        ._z{display:flex;flex-wrap:wrap;margin:20px 0;gap:20px}
        ._l{width:220px;border:2px groove #000;background:#fff;padding:12px 8px;font-size:14px;line-height:1.5;text-align:center;font-family:'宋体',SimSun,serif}
        ._l p{font-family:'篆体','华文篆书','STZhuanSong',serif;font-weight:normal;font-size:15px;}
        ._l div:first-child{font-family:'宋体',SimSun,serif;}
        ._c2{flex:2;text-align:center;border-left:1px solid #aaa;border-right:1px solid #aaa;padding:0 20px}
        ._s{font-size:22px;font-weight:bold;margin:15px 0 20px 0;letter-spacing:2px;font-family:'楷体','华文楷书','KaiTi',serif;font-weight:bold}
        ._g{display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:10px;margin-bottom:30px}
        ._b{display:inline-block;width:180px;padding:8px 0;background:#f0f0f0;border:2px outset #7f7f7f;font-family:'宋体',SimSun,monospace;font-size:16px;font-weight:bold;text-align:center;text-decoration:none;color:#000;cursor:pointer}
        ._b:active{border:2px inset #7f7f7f}
        ._r{width:240px;border:2px solid #000;background:#fff;padding:12px 6px;text-align:center;font-family:'宋体',SimSun,serif;display:flex;flex-direction:column;align-items:center}
        ._rl{font-size:14px;font-weight:bold;text-decoration:underline;margin-bottom:6px;font-family:'宋体',SimSun,serif}
        ._tz{font-size:12px;margin-bottom:10px;font-family:'宋体',SimSun,serif}
        ._clockCanvas{display:block;margin:5px auto;background:#fff;border:1px solid #333;border-radius:50%;box-shadow:none}
        hr{border-top:2px solid #000;margin:20px 0 5px}
        @media (max-width:780px){._l,._r{width:auto}._c2{border-left:none;border-right:none}._z{flex-direction:column}._r{margin-top:10px}}
    </style>
</head>
<body>
<div class="_c">
    <div class="_m"><span class="_mt">　　在此处便捷下载　　　安装前请使用hash先验证　　　感谢各位的支持　　&nbsp;&nbsp;　　在此处便捷下载　　　安装前请使用hash先验证　　　感谢各位的支持　　&nbsp;&nbsp;</span></div>
    <div class="_h"><span class="_hl" id="_h0">首页</span><span class="_dn" id="_d0">捐赠</span></div>
    <div class="_z">
        <div class="_l"><div style="font-weight:bold;border-bottom:1px solid #000;display:inline-block;margin-bottom:8px;">※ 铭谢 ※</div><p>感谢天涯海角朋友的支持！<br>1998 - 2026</p><div style="font-size:11px;margin-top:6px;">[ 友谊长存 ]</div></div>
        <div class="_c2"><div class="_s">“进入下载站”</div><div class="_g"><div class="_b" id="_b0">操作系统</div><div class="_b" id="_b1">应用程式</div><div class="_b" id="_b2">信息更新</div></div><div style="font-size:12px;border-top:1px dotted gray;display:inline-block;padding-top:6px;">▼ 请选择分类 ▼</div></div>
        <div class="_r"><div class="_rl">您的时间</div><div class="_tz" id="_tzs">时区: GMT+8 (北京)</div><canvas id="_clockFace" width="120" height="120" class="_clockCanvas" style="width:120px;height:120px"></canvas></div>
    </div>
    <hr>
    <div style="text-align:center;font-size:11px;margin:10px 0 5px;font-family:'宋体',SimSun,serif;">&copy; 1998-2026 下载站</div>
</div>
<script>
(function(){
    let _X=document.getElementById('_clockFace');
    let _tzSpan=document.getElementById('_tzs');
    if(!_X)return;
    let ctx=_X.getContext('2d');
    let w=120,h=120;
    let radius=w/2-5;
    function drawClock(){
        let now=new Date();
        let hr=now.getHours()%12;
        let mn=now.getMinutes();
        let sc=now.getSeconds();
        let mill=now.getMilliseconds();
        let secAngle=(sc+mill/1000)*6;
        let minAngle=mn*6+secAngle/60;
        let hourAngle=hr*30+minAngle/12;
        ctx.clearRect(0,0,w,h);
        ctx.save();
        ctx.translate(w/2,h/2);
        ctx.beginPath();
        ctx.arc(0,0,radius,0,2*Math.PI);
        ctx.strokeStyle='#000';
        ctx.lineWidth=1.5;
        ctx.stroke();
        ctx.fillStyle='#fff';
        ctx.fill();
        for(let i=1;i<=12;i++){
            let angle=i*30*Math.PI/180;
            let x1=(radius-8)*Math.sin(angle);
            let y1=-(radius-8)*Math.cos(angle);
            let x2=(radius-2)*Math.sin(angle);
            let y2=-(radius-2)*Math.cos(angle);
            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.lineWidth=1.8;
            ctx.strokeStyle='#000';
            ctx.stroke();
            let numX=(radius-15)*Math.sin(angle);
            let numY=-(radius-15)*Math.cos(angle);
            ctx.font='bold 10px "宋体", SimSun';
            ctx.fillStyle='#000';
            ctx.textAlign='center';
            ctx.textBaseline='middle';
            ctx.fillText(i.toString(),numX,numY);
        }
        for(let i=0;i<60;i++){
            let angle=i*6*Math.PI/180;
            let len=(i%5===0)?6:3;
            let x1=(radius-len)*Math.sin(angle);
            let y1=-(radius-len)*Math.cos(angle);
            let x2=radius*Math.sin(angle);
            let y2=-radius*Math.cos(angle);
            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.lineWidth=0.8;
            ctx.strokeStyle='#333';
            ctx.stroke();
        }
        let hourLen=radius*0.5;
        let minLen=radius*0.7;
        let secLen=radius*0.85;
        let hourRad=(hourAngle-90)*Math.PI/180;
        let minRad=(minAngle-90)*Math.PI/180;
        let secRad=(secAngle-90)*Math.PI/180;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(hourLen*Math.cos(hourRad),hourLen*Math.sin(hourRad));
        ctx.lineWidth=3;
        ctx.strokeStyle='#000';
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(minLen*Math.cos(minRad),minLen*Math.sin(minRad));
        ctx.lineWidth=2.2;
        ctx.strokeStyle='#222';
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(secLen*Math.cos(secRad),secLen*Math.sin(secRad));
        ctx.lineWidth=1.2;
        ctx.strokeStyle='#cc0000';
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0,0,2.5,0,2*Math.PI);
        ctx.fillStyle='#000';
        ctx.fill();
        ctx.restore();
        let tzOff=-now.getTimezoneOffset()/60;
        let tzSign=tzOff>=0?'+':'';
        let tzVal=Math.abs(tzOff);
        let tzStr=`时区: GMT${tzSign}${tzVal} (${tzOff===8?'北京':tzOff===0?'伦敦':tzOff===-5?'纽约':'本地'})`;
        if(_tzSpan)_tzSpan.innerText=tzStr;
    }
    drawClock();
    setInterval(drawClock,200);
})();
(function(){
    let _A=document.getElementById('_h0');
    if(_A){_A.onclick=function(){window.location.href='https://uplgov.github.io/download-station/';};}
    let _B=document.getElementById('_d0');
    if(_B){_B.onclick=function(){window.location.href='https://uplgov.github.io/download-station/donations';};}
    let _C0=document.getElementById('_b0');
    let _C1=document.getElementById('_b1');
    let _C2=document.getElementById('_b2');
    if(_C0){_C0.onclick=function(){window.location.href='https://uplgov.github.io/download-station/os.htm';};}
    if(_C1){_C1.onclick=function(){window.location.href='https://uplgov.github.io/download-station/apps.htm';};}
    if(_C2){_C2.onclick=function(){window.location.href='https://uplgov.github.io/download-station/updates';};}
})();
</script>
</body>
</html>
